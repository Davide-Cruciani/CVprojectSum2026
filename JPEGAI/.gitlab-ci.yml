# This file is a template, and might need editing before it works on your project.
# This is a sample GitLab CI/CD configuration file that should run without any modifications.
# It demonstrates a basic 3 stage CI/CD pipeline. Instead of real tests or scripts,
# it uses echo commands to simulate the pipeline execution.
#
# A pipeline is composed of independent jobs that run scripts, grouped into stages.
# Stages run in sequential order, but jobs within stages run in parallel.
#
# For more information, see: https://docs.gitlab.com/ee/ci/yaml/index.html#stages
#
# You can copy and paste this template into a new `.gitlab-ci.yml` file.
# You should not add this template to an existing `.gitlab-ci.yml` file by using the `include:` keyword.
#
# To contribute improvements to CI/CD templates, please follow the Development guide at:
# https://docs.gitlab.com/ee/development/cicd/templates.html
# This specific template is located at:
# https://gitlab.com/gitlab-org/gitlab/-/blob/master/lib/gitlab/ci/templates/Getting-Started.gitlab-ci.yml

stages:          # List of stages for jobs, and their order of execution
  - unit-test
  - test performance

unit-test:       # This job runs in the build stage, which runs first.
  stage: unit-test
  allow_failure: false
  tags:
    - unit-test
  only:
    - merge_requests      
  script:
    - echo "Activate env."
    - source /root/miniconda3/bin/activate && conda activate jpeg_ai_vm
    - pip install -r requirements.txt
    - dvc remote add -d myremote $DVC_URL
    - dvc remote modify myremote password $DVC_PASS
    - echo "Compiling the code..."
    - ./scripts/build_test_libs.sh
    - echo "Compile complete."
    - echo "Run test for creating all necessary files"    
    - python -m src.reco.scripts.eval --only_cpu
    - echo "Running unit tests... "
    # Storing tensors after test of SGM of ANS if it failed    
    # Storing logs of training if it failed
    - CUDA_VISIBLE_DEVICES="-1" python -m unittest -v || (python ./scripts/post_comment_gitlab.py $GITLAB_TOKEN $CI_MERGE_REQUEST_PROJECT_ID $CI_MERGE_REQUEST_IID --files sgm_err_arr.json factorized_err_arr.json --msg "ANS failed on commit ${CI_COMMIT_SHA} with the following configuration:" --only_if_files_exist && python ./scripts/post_comment_gitlab.py $GITLAB_TOKEN $CI_MERGE_REQUEST_PROJECT_ID $CI_MERGE_REQUEST_IID --files train_logs.tgz --msg "Training failed on commit ${CI_COMMIT_SHA}. Logs:" --only_if_files_exist && exit 1 )

test-img30-perf:
  stage: test performance
  allow_failure: false
  tags:
    - test-1img
  only:
    - merge_requests      
  script:
    - echo "Activate env."
    - source /root/miniconda3/bin/activate && conda activate jpeg_ai_vm
    - echo "Install necessary packages"
    - pip install -r requirements.txt
    - apt-get install -y curl
    - echo "Setup DVC"
    - dvc remote add -d myremote $DVC_URL
    - dvc remote modify myremote password $DVC_PASS
    - echo "Compiling the code..."
    - ./scripts/build_test_libs.sh
    - echo "Compile completed."
    - echo "Download image"
    - dvc pull data/test/00030_TE_560x888_8bit_sRGB.png.dvc
    - echo "Run test on 30th image"    
    - CUDA_VISIBLE_DEVICES="-1,-2,-3" ./scripts/run_reco_all_cfgs.sh ./results/base_cfgs_img30 ./cfg/eval/short_test.json --imgs 00030_TE_560x888_8bit_sRGB.png #--only_cpu --cpu_threads_limit 1
    - python ./scripts/merge_op_results.py ./results/base_cfgs_img30 --fn-prefix MR${CI_MERGE_REQUEST_IID}_${CI_COMMIT_SHORT_SHA} --start-row 148 --template ./docs/template_img30.xlsm
    - tar -cvzf logs.tgz results/base_cfgs_img30/*/*.log results/base_cfgs_img30/*/*/log
    - python ./scripts/post_comment_gitlab.py $GITLAB_TOKEN $CI_MERGE_REQUEST_PROJECT_ID $CI_MERGE_REQUEST_IID --files results/base_cfgs_img30/MR${CI_MERGE_REQUEST_IID}_${CI_COMMIT_SHORT_SHA}_*.xlsm logs.tgz --msg "Results of testing on the 30th image of commit ${CI_COMMIT_SHA}"

test-img30-toolena:
  stage: test performance
  allow_failure: false
  tags:
    - test-1img
  only:
    - merge_requests      
  script:
    - echo "Activate env."
    - source /root/miniconda3/bin/activate && conda activate jpeg_ai_vm
    - echo "Install necessary packages"
    - pip install -r requirements.txt
    - apt-get install -y curl
    - echo "Setup DVC"
    - dvc remote add -d myremote $DVC_URL
    - dvc remote modify myremote password $DVC_PASS
    - echo "Compiling the code..."
    - ./scripts/build_test_libs.sh
    - echo "Compile completed."
    - echo "Download image"
    - dvc pull data/test/00030_TE_560x888_8bit_sRGB.png.dvc
    - echo "Run test of tool-ena on 30th image"    
    - CUDA_VISIBLE_DEVICES="-1,-2,-3" python ./scripts/run_tool_perf.py ./cfg/tool_ena ./results/tool_ena --base-cfg ./cfg/eval/bop.json --imgs 00030_TE_560x888_8bit_sRGB.png --only_cpu --cpu_threads_limit 1
    - python ./scripts/merge_op_results.py ./results/tool_ena --fn-prefix MR${CI_MERGE_REQUEST_IID}_${CI_COMMIT_SHORT_SHA}_tool_ena_BOP --start-row 148 --template ./docs/template_img30.xlsm --anchor bop:anchor
    - tar -cvzf logs.tgz results/tool_ena/*/*.log results/tool_ena/*/*/log
    - python ./scripts/post_comment_gitlab.py $GITLAB_TOKEN $CI_MERGE_REQUEST_PROJECT_ID $CI_MERGE_REQUEST_IID --files results/tool_ena/MR${CI_MERGE_REQUEST_IID}_${CI_COMMIT_SHORT_SHA}_tool_ena_BOP_*.xlsm logs.tgz --msg "Results of testing of 'tool ena' on the 30th image of commit ${CI_COMMIT_SHA}"

